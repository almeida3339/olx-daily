name: Monitor

on:
  workflow_dispatch:        # disparado pelo cron-job.org via API (07:00, 16:00 BRT — Enjoei only; OLX roda local)

# Permissões globais. O deploy do Pages exige permissões adicionais.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5 # Atualizado de v4 para v5 para eliminar os avisos amarelos
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Instalar dependencias
        run: npm ci
      - name: Executar testes
        run: npm test

  monitor:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5 # Atualizado de v4 para v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Rodar monitores e notificar
        id: monitor_run
        continue-on-error: true
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          SKIP_OLX: "1"
          OLX_DATA_DIR: ${{ github.workspace }}/data/olx
          ENJOEI_DATA_DIR: ${{ github.workspace }}/data/enjoei
          ENJOEI_NOTEBOOKS_DATA_DIR: ${{ github.workspace }}/data/enjoei-notebooks
          DOCKSTATIONS_DATA_DIR: ${{ github.workspace }}/data/dockstations
          FITBIT_DATA_DIR: ${{ github.workspace }}/data/fitbit
          LIFEFACTORY_DATA_DIR: ${{ github.workspace }}/data/lifefactory
          TELA_GALAXYBOOK3_DATA_DIR: ${{ github.workspace }}/data/tela-galaxybook3
          MELANGER_DATA_DIR: ${{ github.workspace }}/data/melanger
          GALAXY_BUDS4_PRO_DATA_DIR: ${{ github.workspace }}/data/galaxy-buds4-pro
          OURA_RING5_DATA_DIR: ${{ github.workspace }}/data/oura-ring5
          OLED_MONITORES_DATA_DIR: ${{ github.workspace }}/data/oled-monitores
        run: node scripts/run-monitors-and-notify.mjs

      - name: Salvar snapshots e publicar dashboard
        if: always()
        env:
          OLX_DATA_DIR: ${{ github.workspace }}/data/olx
          ENJOEI_DATA_DIR: ${{ github.workspace }}/data/enjoei
          ENJOEI_NOTEBOOKS_DATA_DIR: ${{ github.workspace }}/data/enjoei-notebooks
          DOCKSTATIONS_DATA_DIR: ${{ github.workspace }}/data/dockstations
          FITBIT_DATA_DIR: ${{ github.workspace }}/data/fitbit
          LIFEFACTORY_DATA_DIR: ${{ github.workspace }}/data/lifefactory
          TELA_GALAXYBOOK3_DATA_DIR: ${{ github.workspace }}/data/tela-galaxybook3
          MELANGER_DATA_DIR: ${{ github.workspace }}/data/melanger
          GALAXY_BUDS4_PRO_DATA_DIR: ${{ github.workspace }}/data/galaxy-buds4-pro
          OURA_RING5_DATA_DIR: ${{ github.workspace }}/data/oura-ring5
          OLED_MONITORES_DATA_DIR: ${{ github.workspace }}/data/oled-monitores
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/
          local_commit=0
          if ! git diff --staged --quiet; then
            git commit -m "snapshots $(date -u +%Y-%m-%dT%H:%M)"
            local_commit=1
          fi

          for i in 1 2 3 4; do
            git fetch origin
            if ! git -c core.editor=true rebase -X theirs origin/main; then
              git rebase --abort || true
              echo "Rebase falhou (tentativa $i); nova tentativa."
              sleep $((i * 5)); continue
            fi

            node scripts/generate-dashboard.mjs
            git add index.html
            if ! git diff --staged --quiet; then
              if [ "$local_commit" -eq 1 ]; then
                git commit --amend --no-edit
              else
                git commit -m "dashboard $(date -u +%Y-%m-%dT%H:%M)"
                local_commit=1
              fi
            fi

            if [ "$(git rev-list --count origin/main..HEAD)" -eq 0 ]; then
              echo "Nada novo a publicar."
              exit 0
            fi
            if git push; then
              echo "Push ok (tentativa $i)."
              exit 0
            fi
            echo "Push rejeitado (tentativa $i) - re-sincronizando."
            sleep $((i * 5))
          done
          echo "Falha ao publicar apos 4 tentativas."
          exit 1

      - name: Sinalizar falha dos monitores
        if: steps.monitor_run.outcome == 'failure'
        run: exit 1

  # NOVO JOB: Isola a publicação do dashboard de forma nativa e serverless no Pages
  deploy-pages:
    needs: monitor
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: main # Garante que vai pegar o index.html atualizado após o push bem-sucedido do job anterior

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Como o seu index.html e gerado na raiz do projeto, o caminho e o diretorio atual (.)
          path: '.' 

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
