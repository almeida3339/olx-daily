name: Monitor Notebooks e Tenis

on:
  workflow_dispatch:        # disparado pelo cron-job.org via API (07:00, 12:00, 20:00 BRT)

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Rodar monitores e notificar
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          OLX_DATA_DIR: ${{ github.workspace }}/data/olx
          ENJOEI_DATA_DIR: ${{ github.workspace }}/data/enjoei
          ENJOEI_NOTEBOOKS_DATA_DIR: ${{ github.workspace }}/data/enjoei-notebooks
        run: node scripts/run-monitors-and-notify.mjs

      - name: Gerar dashboard HTML
        env:
          OLX_DATA_DIR: ${{ github.workspace }}/data/olx
          ENJOEI_DATA_DIR: ${{ github.workspace }}/data/enjoei
          ENJOEI_NOTEBOOKS_DATA_DIR: ${{ github.workspace }}/data/enjoei-notebooks
        run: node scripts/generate-dashboard.mjs

      - name: Salvar snapshots no repositorio
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Seta URL com token explícito — evita falha 403 do credential helper
          git remote set-url origin \
            https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          # Sincroniza antes de adicionar — || evita exit 128 caso o pull falhe
          git pull --rebase origin main \
            || { git rebase --abort 2>/dev/null; true; }
          git add data/ index.html || true
          if git diff --staged --quiet; then
            echo "Sem mudancas para commitar."
            exit 0
          fi
          git commit -m "snapshots $(date -u +%Y-%m-%dT%H:%M)"
          for i in 1 2 3; do
            if git push; then
              echo "Push realizado na tentativa $i."
              exit 0
            fi
            echo "Tentativa $i falhou, aguardando $((i * 10))s..."
            git pull --rebase origin main \
              || { git rebase --abort 2>/dev/null; true; }
            sleep $((i * 10))
          done
          echo "Falha ao fazer push apos 3 tentativas."
          exit 1
